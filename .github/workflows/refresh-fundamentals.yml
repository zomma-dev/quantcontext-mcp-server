name: Refresh Fundamentals Seed

on:
  schedule:
    - cron: "0 6 1 * *"  # 1st of each month at 6am UTC
  workflow_dispatch: {}    # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Refresh fundamentals
        run: python scripts/refresh_fundamentals.py

      - name: Commit updated seed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/quantcontext/data/fundamentals_seed.json
          git diff --staged --quiet || git commit -m "chore: refresh fundamentals seed [skip ci]"
          git push
