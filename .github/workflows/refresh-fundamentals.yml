name: Refresh Seed Data

on:
  schedule:
    - cron: "0 6 1 * *"  # 1st of each month at 6am UTC
  workflow_dispatch: {}    # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Refresh all seed data
        run: python scripts/refresh_fundamentals.py

      - name: Commit updated seed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/quantcontext/data/
          git diff --staged --quiet || git commit -m "chore: refresh seed data [skip ci]"
          git push
